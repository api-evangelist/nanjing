aid: nanjing
name: Nanjing University
description: >-
  Nanjing University (NJU), founded in 1902 and located in Nanjing, Jiangsu,
  China, is one of China's oldest and most prestigious research universities and
  is ranked #145 in the QS World University Rankings 2025. The university
  operates a unified identity authentication (CAS-based single sign-on) platform
  at authserver.nju.edu.cn and runs library discovery systems (OPAC and Summon)
  and a campus map, but it does not publish a public, documented developer API
  program or an open-data portal. The footprint cataloged here reflects only
  publicly observable, institution-facing systems; no public API endpoints,
  signup, or developer documentation were confirmed.
