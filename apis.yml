apis:
  - aid: nanjing:auth
    name: Nanjing University Unified Identity Authentication (CAS SSO)
    description: >-
      Nanjing University operates a unified identity authentication platform
      providing single sign-on across university systems. The login service is a
      CAS (Central Authentication Service) deployment supporting password,
      verification code, biometric, and QR-code login methods. It is intended
      for institutional accounts and is not a publicly documented developer API;
      no public client registration or developer documentation was confirmed.
